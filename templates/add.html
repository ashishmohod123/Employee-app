<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
      form input {
        display: block;
        width: 100%;
        padding: 8px;
        margin: 10px 0;
      }
      label {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <h2>Add New Employee</h2>
      <form method="POST">
        <label>Full Name:</label>
        <input type="text" name="name" required placeholder="John Doe" />

        <label>Department:</label>
        <input type="text" name="dept" required placeholder="IT" />

        <label>Salary:</label>
        <input type="number" name="salary" required placeholder="50000" />

        <button type="submit" class="btn-add" style="border:none; width:100%; cursor:pointer;">Save Employee</button>
      </form>
      <a href="/" style="color:white; display:block; text-align:center; margin-top:10px;">Cancel and Go Back</a>
    </div>
  </body>
</html>
